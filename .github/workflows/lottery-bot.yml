name: Lottery Daily Draw Bot

on:
  schedule:
    - cron: "0 15 * * *"   # 매일 자정 KST (= 15:00 UTC)

  workflow_dispatch:        # 수동 실행 버튼 (테스트용)

jobs:
  run-lottery-bot:
    name: Run Lottery Draw Cycle
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── initiad 설치 ──────────────────────────────────────────────────────
      - name: Install initiad CLI
        run: |
          curl -L \
            "https://github.com/initia-labs/initia/releases/download/v0.6.8/initiad_v0.6.8_Linux_x86_64.tar.gz" \
            -o initiad.tar.gz
          tar -xzf initiad.tar.gz
          sudo mv initiad /usr/local/bin/initiad
          initiad version

      # ─── Python 세팅 ───────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ─── 키링 디렉토리 세팅 ────────────────────────────────────────────────
      - name: Setup keyring directory
        run: mkdir -p /tmp/initia-keyring

      # ─── 봇 실행 ───────────────────────────────────────────────────────────
      - name: Run lottery bot
        env:
          MNEMONIC:               ${{ secrets.LOTTERY_ADMIN_MNEMONIC }}
          KEYRING_PASSPHRASE:     ${{ secrets.KEYRING_PASSPHRASE }}
          LOTTERY_MODULE_ADDRESS: "0x2293569A34B1915D873A362E887FE9875DDF30B4"
          NODE_RPC:               "https://sequencer-rpc-lotteria-1.anvil.asia-southeast.initia.xyz:443"
          CHAIN_ID:               "lotteria-1"
          GAS:                    "1000000"
          FEES:                   "20000l2/fbee3e5792cd4f22153623725eabd4aeac56fe1093abb39ed05403bfcdd3c15f"
          KEY_NAME:               "admin"
          SLEEP_BETWEEN_TX:       "8"
        run: python lottery_bot.py

      # ─── 실패 시 알림 ──────────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: echo "::error::Lottery bot cycle failed! Check logs above."
        # Slack/Discord 웹훅 알림 추가하려면:
        # curl -X POST "${{ secrets.SLACK_WEBHOOK }}" \
        #   -H 'Content-type: application/json' \
        #   --data '{"text":"Lottery bot failed!"}'